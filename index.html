<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetOurTeam</title>

    <link rel="stylesheet" href="/css/style.css">
</head>
    <body>

        <main class="container">
            <h1>Meet our Team</h1>
            <p class="intro">
                Lorem ipsum dolor, sit amet consectetur adipisicing elit. Ut aut odit, voluptates minima eius,

            <div id="team-container"></div>

            <section class="form-section">
                <h2>Aggiungi un nuovo membro</h2>

                <form id="member-form">
                    <input type="text" id="name" placeholder="Nome e cognome" required>
                    <input type="text" id="role" placeholder="Ruolo" required>
                    <input type="email" id="email" placeholder="Email" required>
                    <input type="text" id="img" placeholder="Percorso immagine es. img/male1.png" required>
                    <button type="submit">Aggiungi membro</button>
                </form>
            </section>
        </main>

        <script src="scripts/teams.js"></script>
        <script src="scripts/script.js"></script>
